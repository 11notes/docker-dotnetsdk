name: run

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'which job to run'
        type: string
        required: false

jobs:
  # ╔═════════════════════════════════════════════════════╗
  # ║                                                     ║
  # ║                                                     ║
  # ║            CHECK FOR AVAILABLE UPDATES              ║
  # ║                                                     ║
  # ║                                                     ║
  # ╚═════════════════════════════════════════════════════╝
  update:
    if: ${{ github.event.inputs.job == 'update' }}
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: write

    steps:
      - name: checkout all tags
        uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2
        with:
          ref: 'master'
          fetch-depth: 0

      # 10.0
      - name: get latest 10.0 version
        run: |
          LATEST_VERSION=$(curl -s https://dotnetcli.blob.core.windows.net/dotnet/release-metadata/releases-index.json | jq -r '."releases-index"[] | select(."channel-version" == "10.0") | ."latest-sdk"')
          if [ "${LATEST_VERSION}" != "null" ]; then
            if ! curl -kILs --fail https://hub.docker.com/v2/repositories/11notes/dotnetsdk/tags/${LATEST_VERSION}; then
              echo "LATEST_VERSION_100=${LATEST_VERSION}" >> "${GITHUB_ENV}"
            fi
          fi

      - name: check if updated is needed 10.0
        if: env.LATEST_VERSION_100 != 'null' && env.LATEST_VERSION_100 != ''
        uses: 11notes/action-org-update@v1 # v1.0.0
        with:
          latest: ${{ env.LATEST_VERSION_100 }}

      - name: call version 10.0
        if: env.ORG_UPDATE == 'true'
        uses: the-actions-org/workflow-dispatch@3133c5d135c7dbe4be4f9793872b6ef331b53bc7
        with:
          wait-for-completion: false
          workflow: org.version
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "version":"${{ env.LATEST_VERSION_100 }}" }'

      - name: update semver version 10.0
        if: env.ORG_UPDATE == 'true'
        uses: the-actions-org/workflow-dispatch@3133c5d135c7dbe4be4f9793872b6ef331b53bc7
        with:
          wait-for-completion: false
          workflow: json.latest.yml
          repo: 11notes/CICD
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "app":"dotnet10", "version":"${{ env.LATEST_VERSION_100 }}" }'

      # 9.0
      - name: get latest 9.0 version
        run: |
          LATEST_VERSION=$(curl -s https://dotnetcli.blob.core.windows.net/dotnet/release-metadata/releases-index.json | jq -r '."releases-index"[] | select(."channel-version" == "9.0") | ."latest-sdk"')
          if [ "${LATEST_VERSION}" != "null" ]; then
            if ! curl -kILs --fail https://hub.docker.com/v2/repositories/11notes/dotnetsdk/tags/${LATEST_VERSION}; then
              echo "LATEST_VERSION_90=${LATEST_VERSION}" >> "${GITHUB_ENV}"
            fi
          fi

      - name: check if updated is needed 9.0
        if: env.LATEST_VERSION_90 != 'null' && env.LATEST_VERSION_90 != ''
        uses: 11notes/action-org-update@v1 # v1.0.0
        with:
          latest: ${{ env.LATEST_VERSION_90 }}

      - name: call version 9.0
        if: env.ORG_UPDATE == 'true'
        uses: the-actions-org/workflow-dispatch@3133c5d135c7dbe4be4f9793872b6ef331b53bc7
        with:
          wait-for-completion: false
          workflow: org.version
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "version":"${{ env.LATEST_VERSION_90 }}" }'

      - name: update semver version 9.0
        if: env.ORG_UPDATE == 'true'
        uses: the-actions-org/workflow-dispatch@3133c5d135c7dbe4be4f9793872b6ef331b53bc7
        with:
          wait-for-completion: false
          workflow: json.latest.yml
          repo: 11notes/CICD
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "app":"dotnet9", "version":"${{ env.LATEST_VERSION_90 }}" }'

      # 8.0
      - name: get latest 8.0 version
        run: |
          LATEST_VERSION=$(curl -s https://dotnetcli.blob.core.windows.net/dotnet/release-metadata/releases-index.json | jq -r '."releases-index"[] | select(."channel-version" == "8.0") | ."latest-sdk"')
          if [ "${LATEST_VERSION}" != "null" ]; then
            if ! curl -kILs --fail https://hub.docker.com/v2/repositories/11notes/dotnetsdk/tags/${LATEST_VERSION}; then
              echo "LATEST_VERSION_80=${LATEST_VERSION}" >> "${GITHUB_ENV}"
            fi
          fi

      - name: check if updated is needed 8.0
        if: env.LATEST_VERSION_80 != 'null' && env.LATEST_VERSION_80 != ''
        uses: 11notes/action-org-update@v1 # v1.0.0
        with:
          latest: ${{ env.LATEST_VERSION_80 }}

      - name: call version 8.0
        if: env.ORG_UPDATE == 'true'
        uses: the-actions-org/workflow-dispatch@3133c5d135c7dbe4be4f9793872b6ef331b53bc7
        with:
          wait-for-completion: false
          workflow: org.version
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "version":"${{ env.LATEST_VERSION_80 }}" }'

      - name: update semver version 8.0
        if: env.ORG_UPDATE == 'true'
        uses: the-actions-org/workflow-dispatch@3133c5d135c7dbe4be4f9793872b6ef331b53bc7
        with:
          wait-for-completion: false
          workflow: json.latest.yml
          repo: 11notes/CICD
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "app":"dotnet8", "version":"${{ env.LATEST_VERSION_80 }}" }'